<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3"/>
      <stop offset="50%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="180" fill="rgba(255,255,255,0.05)"/>
  <circle cx="150" cy="550" r="140" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="500" r="100" fill="rgba(6,182,212,0.15)"/>

  <!-- Card -->
  <rect x="60" y="60" width="1080" height="510" rx="24" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Badge -->
  <rect x="100" y="110" width="220" height="40" rx="20" fill="rgba(255,255,255,0.2)"/>
  <text x="210" y="136" fill="white" font-size="16" font-weight="600" text-anchor="middle" opacity="0.9">✓ 100% FREE · No Signup</text>

  <!-- Main heading -->
  <text x="600" y="250" fill="white" font-size="72" font-weight="900" text-anchor="middle">TOEFL Prep Hub</text>
  <text x="600" y="320" fill="rgba(255,255,255,0.9)" font-size="36" font-weight="400" text-anchor="middle">Free 2026 Practice Tests – New Format</text>

  <!-- Divider -->
  <rect x="460" y="350" width="280" height="3" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Feature pills -->
  <rect x="100" y="390" width="270" height="52" rx="26" fill="rgba(255,255,255,0.15)"/>
  <text x="235" y="422" fill="white" font-size="20" text-anchor="middle">📖 Reading Practice</text>

  <rect x="465" y="390" width="270" height="52" rx="26" fill="rgba(255,255,255,0.15)"/>
  <text x="600" y="422" fill="white" font-size="20" text-anchor="middle">✍️ Writing Practice</text>

  <rect x="830" y="390" width="270" height="52" rx="26" fill="rgba(255,255,255,0.15)"/>
  <text x="965" y="422" fill="white" font-size="20" text-anchor="middle">🎯 Full Mock Test</text>

  <!-- URL -->
  <text x="600" y="520" fill="rgba(255,255,255,0.6)" font-size="20" text-anchor="middle">saikoushik1314.github.io/toefl</text>
