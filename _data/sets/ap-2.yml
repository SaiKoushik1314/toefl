id: ap-2
mode: academic-passage
name: Sleep and Memory
difficulty: Medium-Hard
intro: Answer questions about main idea, support, vocabulary, and inference.
passage: |
  <p>Sleep is often described as a period of rest, but researchers increasingly view it as an active stage of mental processing. During sleep, the brain does not simply shut down. Instead, it continues to organize information, regulate biological systems, and support processes related to learning and memory.</p>
  <p>One reason sleep interests scientists is its apparent role in memory consolidation. This term refers to the process by which newly learned information becomes more stable over time. Studies have shown that people often perform better on certain tasks after a full night of sleep than after staying awake for the same length of time. In some experiments, participants who sleep after practice are better able to remember word pairs, movement patterns, or problem-solving strategies.</p>
  <p>Researchers do not claim that sleep automatically improves every kind of learning. Factors such as stress, prior knowledge, and the difficulty of the material also matter. Even so, the evidence suggests that sleep helps the brain strengthen some memories while reducing interference from competing information. For students, this means that studying late into the night may be less effective than combining focused review with adequate rest.</p>
questions:
  - prompt: What is the main idea of the passage?
    options: [Sleep is a passive state with little effect on learning., Sleep plays an active role in processing information and supporting memory., Memory depends only on prior knowledge., Students should never study at night.]
    answer: 1
    explanation: The passage emphasizes sleep as an active process that supports memory.
  - prompt: According to paragraph 1, what does the brain do during sleep?
    options: [It stops all mental activity., It organizes information and supports important processes., It forgets recently learned material completely., It focuses only on physical movement.]
    answer: 1
    explanation: Paragraph 1 states that the brain continues to organize information and support learning-related processes.
  - prompt: What does "memory consolidation" mean in the passage?
    options: [The loss of old memories, The process by which new learning becomes more stable, The act of reading quickly, The replacement of one memory with another]
    answer: 1
    explanation: The passage defines the term directly.
  - prompt: What have some studies shown?
    options: [People learn equally well whether or not they sleep., People often perform better after sleeping than after staying awake for the same amount of time., Only movement-based tasks improve after sleep., Sleep matters only for children.]
    answer: 1
    explanation: This is stated in paragraph 2.
  - prompt: Which example is given of a task improved after sleep?
    options: [Driving in heavy traffic, Remembering word pairs, Speaking a new language perfectly, Writing longer essays]
    answer: 1
    explanation: Word pairs are listed among the examples.
  - prompt: "The word \"apparent\" in paragraph 2 is closest in meaning to:"
    options: [obvious-seeming, imaginary, irrelevant, permanent]
    answer: 0
    explanation: Apparent here means seeming or evident.
  - prompt: Which factor does the passage say also affects learning?
    options: [The color of the classroom, Stress, The season of the year, Handwriting style]
    answer: 1
    explanation: "Paragraph 3 lists stress, prior knowledge, and difficulty of material."
  - prompt: What does the passage suggest about all-night studying?
    options: [It is always the best strategy before a test., It may be less effective than study combined with rest., It has no relationship to memory., It improves all kinds of learning equally.]
    answer: 1
    explanation: The conclusion suggests rest should accompany focused review.
  - prompt: "What does sleep help reduce, according to paragraph 3?"
    options: [Reading speed, Competing information that interferes with memory, Prior knowledge, The need for practice]
    answer: 1
    explanation: The passage says sleep may reduce interference from competing information.
  - prompt: Which statement best summarizes the passage?
    options: [Sleep is useful mainly because it saves time., "Sleep appears to support memory and learning, although other factors also matter.", Only scientists benefit from sleep research., Memory improves only during stressful situations.]
    answer: 1
    explanation: This answer captures both the central claim and the caution that sleep is not the only factor.
