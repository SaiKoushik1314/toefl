name: Museum Visit Guide
difficulty: Medium
intro: Read the visitor guide and answer questions about purpose, detail, and recommendation.
passage: |
  <p><strong>Visitor Guide: City Museum of Science</strong></p>
  <p>The museum is open from 9:00 a.m. to 6:00 p.m. Tuesday through Sunday and is closed on Mondays. Tickets may be purchased online or at the front desk. Visitors who buy tickets online can enter through the east entrance, which is usually faster during busy hours.</p>
  <p>The special exhibition on ocean exploration is located on the second floor and requires a timed-entry pass. These passes are free, but they are available in limited numbers each day. Families with young children may prefer to begin their visit on the first floor, where the interactive energy gallery allows visitors to touch many of the displays.</p>
  <p>Photography is permitted in most permanent galleries, but flash photography is not allowed. Large backpacks must be checked near the main entrance. The museum cafe serves light meals until 4:30 p.m., while the gift shop remains open until closing time.</p>
questions:
  - prompt: What is the purpose of the guide?
    options: [To review a museum exhibition, To give visitors practical information about a museum visit, To explain how to apply for museum jobs, To compare several local museums]
    answer: 1
    explanation: The guide provides opening hours, ticketing, rules, and recommendations for visitors.
  - prompt: When is the museum closed?
    options: [Every Sunday, On Mondays, After 4:30 p.m., Only during winter]
    answer: 1
    explanation: The first paragraph states that the museum is closed on Mondays.
  - prompt: Which entrance is usually faster for online ticket holders?
    options: [Main entrance, West entrance, East entrance, North entrance]
    answer: 2
    explanation: The east entrance is described as usually faster during busy hours.
  - prompt: What is required for the ocean exploration exhibition?
    options: [A student ID, An extra payment, A timed-entry pass, A guidebook from the gift shop]
    answer: 2
    explanation: The second paragraph says the exhibition requires a timed-entry pass.
  - prompt: What is true about timed-entry passes?
    options: [They are expensive., They are available only online., They are free but limited each day., They are needed for all floors.]
    answer: 2
    explanation: The passage states that they are free but limited.
  - prompt: Why might families with young children begin on the first floor?
    options: [The cafe is there., The gift shop is quieter there., The gallery there includes hands-on exhibits., The second floor is closed in the morning.]
    answer: 2
    explanation: The energy gallery allows visitors to touch many displays, which may suit young children.
  - prompt: What kind of photography is not allowed?
    options: [Outdoor photography, Flash photography, Phone photography, Black-and-white photography]
    answer: 1
    explanation: The guide explicitly prohibits flash photography.
  - prompt: What must visitors do with large backpacks?
    options: [Carry them only on the first floor, Leave them near the cafe, Check them near the main entrance, Store them in the gift shop]
    answer: 2
    explanation: The third paragraph states this directly.
  - prompt: Until what time does the museum cafe serve light meals?
    options: ["4:30 p.m.", "5:00 p.m.", "6:00 p.m.", "9:00 a.m."]
    answer: 0
    explanation: The guide says the cafe serves light meals until 4:30 p.m.
  - prompt: What can be inferred about the gift shop?
    options: [It closes before the cafe., It opens only on weekends., It stays open later than the cafe., It requires a timed-entry pass.]
    answer: 2
    explanation: The gift shop remains open until closing time, while the cafe stops serving earlier.
