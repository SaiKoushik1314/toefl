id: cw-3
mode: complete-words
name: Community Garden Project
difficulty: Medium
intro: Choose the word that best fits the meaning and tone of the passage.
passage: |
  <p>A neighborhood group recently transformed an empty lot into a community garden. Before the project began, the space looked neglected and somewhat <span class="blank">_____</span>, with broken fencing and weeds covering most of the ground. Several residents wanted to improve the area, but they knew that the work would require patience and <span class="blank">_____</span> effort over several months.</p>
  <p>First, volunteers removed trash and repaired the fence. Next, they measured the land carefully so the garden beds could be arranged in an orderly <span class="blank">_____</span>. Local businesses donated soil, tools, and seeds, while children from a nearby school painted signs to label the vegetables. As the project developed, more neighbors became interested and offered to help. Their participation gradually turned the garden into a shared source of pride rather than a private <span class="blank">_____</span> for only a few people.</p>
  <p>By late summer, the garden was producing tomatoes, beans, herbs, and flowers. Residents often stopped to talk there in the evening, and some said the space had made the street feel more welcoming and <span class="blank">_____</span>. Although the garden still needed regular care, the group believed the results were worth the effort. They had not only grown food; they had also created a place that strengthened the neighborhood&#39;s sense of <span class="blank">_____</span>.</p>
questions:
  - prompt: "Blank 1"
    options: [abandoned, popular, efficient, famous]
    answer: 0
    explanation: The empty lot looked neglected, so abandoned fits best.
  - prompt: "Blank 2"
    options: [sudden, consistent, careless, costly]
    answer: 1
    explanation: The effort needed to continue over several months, so consistent is best.
  - prompt: "Blank 3"
    options: [pattern, schedule, ceremony, debate]
    answer: 0
    explanation: Garden beds are arranged in a physical pattern or layout.
  - prompt: "Blank 4"
    options: [benefit, hobby, responsibility, competition]
    answer: 1
    explanation: The contrast is between shared pride and a private hobby.
  - prompt: "Blank 5"
    options: [distant, unsafe, isolated, friendly]
    answer: 3
    explanation: The street felt more welcoming and friendly.
  - prompt: "Blank 6"
    options: [humor, arrival, community, silence]
    answer: 2
    explanation: "The garden strengthened the neighborhood's sense of community."
  - prompt: Why did the group measure the land carefully?
    options: [To compare it with nearby parks., To arrange the garden beds neatly., To decide where to build a road., To estimate the cost of the fence.]
    answer: 1
    explanation: The passage states that measurement helped arrange the beds in an orderly way.
  - prompt: What caused more neighbors to join the project?
    options: [The project became visible as it developed., The school required them to help., The city paid them to participate., The garden produced food immediately.]
    answer: 0
    explanation: As the project developed, more neighbors became interested and offered help.
  - prompt: "Which statement best describes the garden's effect?"
    options: [It reduced the amount of local traffic., It gave the neighborhood a stronger shared identity., It replaced the need for grocery stores., It became a private space for students.]
    answer: 1
    explanation: The final paragraph emphasizes pride, conversation, and community.
  - prompt: "The main idea of the passage is that:"
    options: [gardens are difficult to maintain in cities, children usually enjoy outdoor painting activities, a shared local project can improve both a place and the people around it, vegetables grow faster in empty lots than in parks]
    answer: 2
    explanation: The passage shows how the garden improved the physical space and social ties.
