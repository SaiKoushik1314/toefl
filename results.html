<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Results – TOEFL Prep Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .results-wrap { max-width: 780px; margin: 0 auto; padding: 32px 0; }
    .overall-card { background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--secondary)); color: white; border-radius: var(--radius); padding: 40px; text-align: center; margin-bottom: 28px; }
    .overall-card h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .overall-card p { opacity: 0.9; margin-bottom: 24px; }
    .big-score { font-size: 5rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
    .big-score-label { font-size: 0.9rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 24px; }
    .section-result { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 28px; margin-bottom: 20px; }
    .section-result h2 { font-size: 1.2rem; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .task-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 0.93rem; }
    .task-row:last-child { border: none; }
    .task-score { font-weight: 700; color: var(--primary); }
    .task-score.good { color: var(--success); }
    .task-score.ok { color: var(--warning); }
    .task-score.poor { color: var(--danger); }
    .feedback-summary { background: var(--surface2); border-radius: var(--radius-sm); padding: 20px; margin-top: 16px; }
    .feedback-summary h3 { font-size: 0.95rem; margin-bottom: 10px; color: var(--primary); }
    .feedback-summary ul { padding-left: 18px; font-size: 0.88rem; color: var(--text-muted); }
    .feedback-summary li { margin-bottom: 6px; }
    .action-row { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 28px; }
    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
    .band-bar { display: flex; gap: 4px; margin: 16px 0 8px; }
    .band-seg { flex: 1; height: 10px; border-radius: 99px; background: var(--border); }
    .band-seg.filled { background: linear-gradient(90deg, var(--primary), var(--secondary)); }
    .disclaimer { font-size: 0.78rem; color: var(--text-light); text-align: center; margin-top: 24px; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">📘 <span>TOEFL</span> Prep Hub</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="reading.html">Reading</a></li>
    <li><a href="writing.html">Writing</a></li>
    <li><a href="mock-test.html">Mock Test</a></li>
  </ul>
  <button class="nav-toggle" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
</nav>

<div class="container">
  <div class="ad-banner ad-banner-top" style="margin-top:16px;">📢 Advertisement – Google AdSense</div>

  <div class="results-wrap" id="resultsWrap">
    <!-- Populated by JS from sessionStorage -->
  </div>
</div>

<footer>
  <p>© 2026 TOEFL Prep Hub · Not affiliated with ETS · TOEFL® is a registered trademark of ETS</p>
</footer>

<script>
  const wrap = document.getElementById('resultsWrap');

  // Read results saved to sessionStorage by mock-test.js or reading/writing JS
  const raw = sessionStorage.getItem('toeflResults');

  if (!raw) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="icon">📋</div>
        <h2>No Results Yet</h2>
        <p style="max-width:400px;margin:0 auto 24px;">Complete a practice section or full mock test to see your results here.</p>
        <div class="action-row">
          <a href="reading.html" class="btn btn-primary">📖 Practice Reading</a>
          <a href="writing.html" class="btn btn-secondary">✍️ Practice Writing</a>
          <a href="mock-test.html" class="btn btn-secondary">🎯 Mock Test</a>
        </div>
      </div>`;
  } else {
    const data = JSON.parse(raw);
    renderResults(data);
  }

  function scoreColor(pct) {
    if (pct >= 80) return 'good';
    if (pct >= 55) return 'ok';
    return 'poor';
  }

  function emoji(pct) {
    if (pct >= 80) return '🎉';
    if (pct >= 60) return '👍';
    return '📚';
  }

  function feedbackForScore(pct, section) {
    if (section === 'Reading') {
      if (pct >= 80) return ['Strong vocabulary and comprehension skills.', 'You identified main ideas and details accurately.', 'Keep practicing Academic Reading for even higher scores.'];
      if (pct >= 55) return ['Review vocabulary questions — they are the quickest wins.', 'For daily life passages, focus on why documents are written.', 'Practice skimming academic passages before reading questions.'];
      return ['Spend 10 min/day on the Academic Word List.', 'Re-read each passage carefully before answering.', 'Watch out for distractors that use words from the text.'];
    } else {
      if (pct >= 80) return ['Your writing shows strong grammar and vocabulary range.', 'Good structure and coherence in your responses.', 'Try to add more complex sentence types to push your score higher.'];
      if (pct >= 55) return ['Make sure to cover all required points in emails.', 'Aim for 130+ words in email tasks and 120+ in discussion tasks.', 'Use polite hedging phrases: "Would it be possible to…"'];
      return ['Focus on sentence structure — mix simple and complex sentences.', 'Always include a specific example in your discussion responses.', 'Proofread carefully for grammar errors before submitting.'];
    }
  }

  function renderResults(data) {
    // data = { sections: [{ name, correct, total, tasks: [{ name, correct, total }] }], timestamp }
    const sections = data.sections || [];
    const totalC = sections.reduce((a, s) => a + (s.correct || 0), 0);
    const totalT = sections.reduce((a, s) => a + (s.total || 0), 0);
    const overallPct = totalT > 0 ? Math.round((totalC / totalT) * 100) : 0;
    const date = data.timestamp ? new Date(data.timestamp).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : 'Today';

    let html = `
      <div class="overall-card">
        <h1>${emoji(overallPct)} Practice Results</h1>
        <p>${date}</p>
        <div class="big-score">${overallPct}%</div>
        <div class="big-score-label">Overall Score</div>
        <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">
          <span class="badge">✅ ${totalC} correct</span>
          <span class="badge">📝 ${totalT} total questions</span>
        </div>
      </div>
    `;

    sections.forEach(sec => {
      const pct = sec.total > 0 ? Math.round((sec.correct / sec.total) * 100) : 0;
      const cls = scoreColor(pct);
      const tips = feedbackForScore(pct, sec.name);
      const icon = sec.name === 'Reading' ? '📖' : '✍️';
      const filledSegs = Math.round(pct / 20); // 5 segments

      html += `
        <div class="section-result">
          <h2>${icon} ${sec.name} Section
            <span class="task-score ${cls}" style="margin-left:auto;font-size:1.3rem;">${pct}%</span>
          </h2>
          <div class="band-bar">
            ${[...Array(5)].map((_, i) => `<div class="band-seg ${i < filledSegs ? 'filled' : ''}"></div>`).join('')}
          </div>
          <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:14px;">${sec.correct} / ${sec.total} questions correct</p>
          ${(sec.tasks || []).map(t => {
            const tpct = t.total > 0 ? Math.round((t.correct / t.total) * 100) : null;
            return `
              <div class="task-row">
                <span>${t.name}</span>
                <span class="task-score ${tpct !== null ? scoreColor(tpct) : ''}">
                  ${tpct !== null ? tpct + '%' : 'Written ✓'}
                </span>
              </div>`;
          }).join('')}
          <div class="feedback-summary">
            <h3>💡 Feedback & Tips</h3>
            <ul>${tips.map(t => `<li>${t}</li>`).join('')}</ul>
          </div>
        </div>
      `;
    });

    html += `
      <div class="action-row">
        <a href="mock-test.html" class="btn btn-primary">🔄 Retake Mock Test</a>
        <a href="reading.html" class="btn btn-secondary">📖 Practice Reading</a>
        <a href="writing.html" class="btn btn-secondary">✍️ Practice Writing</a>
        <a href="index.html" class="btn btn-secondary">🏠 Home</a>
      </div>
      <p class="disclaimer">⚠️ This score is for practice only and does not reflect your official TOEFL iBT score.</p>
    `;

    wrap.innerHTML = html;
  }
</script>

</body>
</html>
