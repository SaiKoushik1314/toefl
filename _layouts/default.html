<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  {% seo %}
  <style>
    :root {
      --bg: #f5f7fc;
      --surface: #ffffff;
      --surface-2: #edf2ff;
      --surface-3: #f7f9fe;
      --text: #172033;
      --muted: #64708a;
      --border: #dce4f3;
      --primary: #2747d8;
      --primary-2: #5f7cff;
      --success: #12815a;
      --danger: #c44545;
      --shadow: 0 16px 40px rgba(23,32,51,0.08);
      --radius-xl: 26px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #fbfcff 0%, var(--bg) 100%);
    }
    a { color: inherit; text-decoration: none; }
    button, select { font: inherit; }
    .container { width: min(1200px, calc(100% - 28px)); margin: 0 auto; }

    /* ── Header ── */
    .site-header {
      position: sticky; top: 0; z-index: 40;
      background: rgba(251,252,255,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(220,228,243,0.88);
    }
    .header-row {
      min-height: 74px; display: flex;
      align-items: center; justify-content: space-between; gap: 16px;
    }
    .brand { display: inline-flex; align-items: center; gap: 12px; font-weight: 800; letter-spacing: -0.02em; }
    .brand-mark {
      width: 42px; height: 42px; border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white; display: grid; place-items: center; box-shadow: var(--shadow);
    }
    .nav { display: flex; gap: 20px; color: var(--muted); font-size: 0.95rem; }
    .nav a:hover { color: var(--text); }

    /* ── Hero ── */
    .hero { padding: 42px 0 26px; display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
    .panel, .hero-card, .practice-shell, .mode-card, .stats-card, .tips-card, .resource-card {
      background: var(--surface); border: 1px solid var(--border);
      box-shadow: var(--shadow); border-radius: var(--radius-xl);
    }
    .hero-card { padding: 30px; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 999px;
      background: var(--surface-2); color: var(--primary); font-weight: 700; font-size: 0.92rem;
    }
    h1, h2, h3, p { margin: 0; }
    h1 { margin-top: 16px; font-size: clamp(2.2rem,4vw,4.2rem); line-height: 1.02; letter-spacing: -0.05em; }
    .lead { margin-top: 16px; color: var(--muted); line-height: 1.72; font-size: 1.04rem; max-width: 60ch; }
    .hero-actions { margin-top: 24px; display: flex; flex-wrap: wrap; gap: 12px; }
    .btn { border: 1px solid transparent; border-radius: 14px; padding: 13px 18px; font-weight: 700; cursor: pointer; transition: 160ms ease; }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: white; color: var(--text); border-color: var(--border); }
    .hero-side { display: grid; gap: 14px; align-content: start; }
    .stats-card { padding: 20px; }
    .stats-card small { display: block; color: var(--muted); margin-bottom: 8px; }
    .stats-card strong { font-size: 1.1rem; letter-spacing: -0.02em; }

    /* ── Sections ── */
    .section { padding: 20px 0; }
    .section-head { margin-bottom: 16px; }
    .section-copy { margin-top: 8px; color: var(--muted); line-height: 1.68; max-width: 68ch; }
    .modes-grid, .tips-grid, .resource-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .mode-card, .tips-card, .resource-card { padding: 22px; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 999px;
      background: var(--surface-3); color: var(--muted);
      font-weight: 700; font-size: 0.84rem; margin-bottom: 14px;
    }
    .mode-card p, .tips-card p, .resource-card p { color: var(--muted); line-height: 1.65; margin-top: 10px; }

    /* ── Practice shell ── */
    .practice-shell { padding: 22px; margin-top: 14px; }
    .toolbar { display: grid; grid-template-columns: 1fr auto auto auto; gap: 12px; align-items: end; margin-bottom: 18px; }
    .field label { display: block; font-size: 0.9rem; color: var(--muted); margin-bottom: 8px; font-weight: 700; }
    select { width: 100%; padding: 12px 14px; border-radius: 14px; border: 1px solid var(--border); background: white; color: var(--text); }
    .info-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
    .pill { padding: 8px 12px; border-radius: 999px; background: var(--surface-2); color: var(--primary); font-size: 0.9rem; font-weight: 700; }
    .practice-grid { display: grid; grid-template-columns: minmax(0,1.05fr) minmax(320px,0.95fr); gap: 18px; }
    .panel { padding: 20px; border-radius: var(--radius-lg); }
    .passage { color: #24314c; line-height: 1.9; font-size: 1rem; }
    .passage p + p { margin-top: 14px; }
    .blank { display: inline-block; min-width: 82px; text-align: center; padding: 2px 8px; border-bottom: 2px solid var(--primary); color: var(--primary); font-weight: 800; }
    .question-block + .question-block { margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border); }
    .question-title { font-weight: 800; line-height: 1.45; margin-bottom: 12px; letter-spacing: -0.01em; }
    .options { display: grid; gap: 10px; }
    .option { width: 100%; text-align: left; padding: 13px 14px; border-radius: 14px; border: 1px solid var(--border); background: white; color: var(--text); cursor: pointer; }
    .option:hover { border-color: #bfccee; }
    .option.selected { border-color: var(--primary); background: var(--surface-2); }
    .option.correct { border-color: rgba(18,129,90,0.35); background: rgba(18,129,90,0.08); }
    .option.wrong { border-color: rgba(196,69,69,0.35); background: rgba(196,69,69,0.08); }
    .result-box { display: none; margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border); }
    .result-box.show { display: block; }
    .score { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 8px; }
    .explanation { margin-top: 12px; padding: 12px 14px; border-radius: 14px; background: var(--surface-3); color: #2b3550; line-height: 1.7; }
    .mini-list { margin: 12px 0 0; padding-left: 18px; color: var(--muted); line-height: 1.65; }
    .muted { color: var(--muted); }
    .footer-note { margin-top: 18px; padding: 16px; border-radius: 16px; border: 1px dashed #c8d2ea; background: linear-gradient(180deg,#fbfcff 0%,#f5f8ff 100%); color: var(--muted); }
    .site-footer { padding: 24px 0 48px; color: var(--muted); }

    /* ── Ad slot ── */
    .ad-slot { margin: 24px 0; text-align: center; min-height: 90px; background: var(--surface-3); border: 1px dashed var(--border); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.85rem; }

    @media (max-width: 980px) {
      .hero, .practice-grid, .modes-grid, .tips-grid, .resource-grid, .toolbar { grid-template-columns: 1fr; }
    }
    @media (max-width: 640px) {
      .nav { display: none; }
      .hero-card, .practice-shell, .panel, .mode-card, .tips-card, .resource-card, .stats-card { padding: 18px; }
      h1 { font-size: 2.4rem; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a href="{{ site.baseurl }}/" class="brand" aria-label="TOEFL Reading home">
        <span class="brand-mark">T</span>
        <span>TOEFL Reading</span>
      </a>
      <nav class="nav" aria-label="Main navigation">
        <a href="#modes">Task Types</a>
        <a href="#practice">Practice</a>
        <a href="#tips">Tips</a>
        <a href="#resources">Resources</a>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer class="site-footer">
    <div class="container">
      <p>Free TOEFL-style reading practice. &nbsp;|&nbsp; <a href="{{ site.baseurl }}/privacy">Privacy Policy</a> &nbsp;|&nbsp; Affiliate links may appear in the resources section.</p>
    </div>
  </footer>
</body>
</html>
